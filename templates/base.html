<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Dia Moni - AI/ML Enthusiast, Python Developer, and CSE student portfolio.">
    <title>{% block title %}Dia Moni | AI/ML Enthusiast{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <a class="skip-link" href="#main">Skip to content</a>
    <header class="site-header" data-header>
        <nav class="nav-shell" aria-label="Primary navigation">
            <a class="brand" href="#home" aria-label="Dia Moni home">
                <img src="{{ url_for('static', filename='images/dia-moni-mark.svg') }}" alt="" class="brand-mark">
                <span>Dia Moni</span>
            </a>
            <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-menu" data-nav-toggle>
                <span></span>
                <span></span>
                <span></span>
                <span class="sr-only">Toggle navigation</span>
            </button>
            <div class="nav-links" id="site-menu" data-nav-menu>
                {% for label, target in nav_items %}
                    <a href="#{{ target }}">{{ label }}</a>
                {% endfor %}
                <a class="nav-resume" href="{{ url_for('resume') }}" target="_blank" rel="noopener">Resume</a>
            </div>
        </nav>
    </header>

    <main id="main">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p>Built with Flask for Dia Moni's personal portfolio.</p>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
